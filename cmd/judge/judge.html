<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>agent-compact docket</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --blue: #58a6ff;
  --green: #3fb950;
  --yellow: #d29922;
  --red: #f85149;
  --purple: #bc8cff;
  --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* layout */
.app { display: flex; height: 100vh; }

.sidebar {
  width: 260px;
  min-width: 260px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}

.sidebar-header h1 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}

.sidebar-header .icon { font-size: 18px; }

.sidebar-actions {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.btn {
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  font-size: 12px;
  cursor: pointer;
  font-family: var(--sans);
  transition: all 0.15s;
}
.btn:hover { border-color: var(--text-dim); color: var(--text); }
.btn.primary { background: #238636; border-color: #2ea043; color: #fff; }
.btn.primary:hover { background: #2ea043; }

.tab-bar {
  display: flex;
  border-bottom: 1px solid var(--border);
}
.tab {
  flex: 1;
  padding: 8px 4px;
  text-align: center;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-dim);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--blue); border-bottom-color: var(--blue); }

.file-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
}

.file-item {
  padding: 6px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-dim);
  transition: background 0.1s;
}
.file-item:hover { background: rgba(88,166,255,0.08); }
.file-item.active { background: rgba(88,166,255,0.12); color: var(--text); }
.file-item .badge {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 10px;
  font-weight: 500;
}
.badge-p1 { background: rgba(248,81,73,0.2); color: var(--red); }
.badge-p2 { background: rgba(210,153,34,0.2); color: var(--yellow); }
.badge-p3 { background: rgba(139,148,158,0.2); color: var(--text-dim); }
.badge-active { background: rgba(63,185,80,0.15); color: var(--green); }
.badge-archived { background: rgba(139,148,158,0.15); color: var(--text-dim); }
.badge-risk { background: rgba(210,153,34,0.15); color: var(--yellow); }

.file-group {
  padding: 8px 16px 4px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* main content */
.main {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.main-header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.main-header h2 {
  font-size: 16px;
  font-weight: 600;
}

.content { padding: 24px; flex: 1; max-width: 900px; }

/* welcome screen */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 16px;
  color: var(--text-dim);
}
.welcome .icon { font-size: 48px; }
.welcome p { max-width: 400px; text-align: center; }

/* metadata table */
.meta-table {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 20px;
}
.meta-row {
  display: flex;
  border-bottom: 1px solid var(--border);
}
.meta-row:last-child { border-bottom: none; }
.meta-key {
  width: 180px;
  min-width: 180px;
  padding: 8px 12px;
  background: rgba(22,27,34,0.8);
  font-family: var(--mono);
  font-size: 12px;
  color: var(--blue);
  font-weight: 500;
}
.meta-val {
  flex: 1;
  padding: 8px 12px;
  font-size: 13px;
  word-break: break-all;
}
.meta-val a { color: var(--blue); text-decoration: none; }
.meta-val a:hover { text-decoration: underline; }

/* scope manifest */
.scope-list { list-style: none; }
.scope-list li {
  padding: 4px 0;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.scope-list li::before {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.scope-list li.reviewed::before { background: var(--green); }
.scope-list li.findings::before { background: var(--yellow); }
.scope-list li.edited::before { background: var(--blue); }

/* markdown body */
.md-body { line-height: 1.7; }
.md-body h1 { font-size: 22px; margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.md-body h2 { font-size: 18px; margin: 20px 0 10px; }
.md-body h3 { font-size: 15px; margin: 16px 0 8px; color: var(--blue); }
.md-body p { margin: 8px 0; }
.md-body ul, .md-body ol { margin: 8px 0; padding-left: 24px; }
.md-body li { margin: 4px 0; }
.md-body code {
  font-family: var(--mono);
  font-size: 12px;
  background: rgba(110,118,129,0.15);
  padding: 2px 6px;
  border-radius: 4px;
}
.md-body pre {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 16px;
  margin: 12px 0;
  overflow-x: auto;
}
.md-body pre code {
  background: none;
  padding: 0;
  font-size: 12px;
  line-height: 1.5;
}
.md-body table {
  border-collapse: collapse;
  width: 100%;
  margin: 12px 0;
}
.md-body th, .md-body td {
  border: 1px solid var(--border);
  padding: 6px 12px;
  text-align: left;
  font-size: 13px;
}
.md-body th { background: var(--surface); font-weight: 600; }
.md-body strong { color: var(--text); }
.md-body blockquote {
  border-left: 3px solid var(--border);
  padding-left: 12px;
  color: var(--text-dim);
  margin: 8px 0;
}

/* evidence type badges */
.etype {
  display: inline-block;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.etype-det { background: rgba(63,185,80,0.15); color: var(--green); }
.etype-ana { background: rgba(88,166,255,0.15); color: var(--blue); }
.etype-sub { background: rgba(188,140,255,0.15); color: var(--purple); }

/* lifecycle checker */
.lifecycle-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.lifecycle-row .status-icon { font-size: 16px; }
.lifecycle-ok { color: var(--green); }
.lifecycle-warn { color: var(--yellow); }
.lifecycle-missing { color: var(--red); }

/* scaffold modal */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  width: 600px;
  max-height: 80vh;
  overflow-y: auto;
  padding: 20px;
}
.modal h3 { margin-bottom: 12px; }
.modal textarea {
  width: 100%;
  min-height: 300px;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  font-family: var(--mono);
  font-size: 12px;
  resize: vertical;
  margin: 8px 0;
}
.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 12px;
}

.hidden { display: none !important; }

/* status bar */
.status-bar {
  padding: 4px 16px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-dim);
  display: flex;
  justify-content: space-between;
}
</style>
</head>
<body>

<div class="app">
  <!-- sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="icon">&#x2696;</span>
      <h1>agent-compact docket</h1>
    </div>
    <div class="sidebar-actions">
      <button class="btn primary" id="btn-reload">↻ Reload</button>
      <button class="btn" id="btn-lifecycle">Lifecycle</button>
      <button class="btn" id="btn-scaffold">+ New</button>
    </div>
    <div class="tab-bar">
      <div class="tab active" data-tab="contracts">Contracts</div>
      <div class="tab" data-tab="evidence">Evidence</div>
      <div class="tab" data-tab="precedents">Precedents</div>
      <div class="tab" data-tab="runtime">Runtime</div>
    </div>
    <div class="file-list" id="file-list"></div>
    <div class="status-bar" id="status-bar">No directory loaded</div>
  </div>

  <!-- main -->
  <div class="main">
    <div class="welcome" id="welcome">
      <span class="icon">&#x2696;</span>
      <h2>agent-compact docket</h2>
      <p id="welcome-msg">Loading...</p>
    </div>
    <div id="doc-view" class="hidden">
      <div class="main-header">
        <h2 id="doc-title"></h2>
        <div id="doc-badges"></div>
      </div>
      <div class="content" id="doc-content"></div>
    </div>
  </div>
</div>

<!-- scaffold modal -->
<div class="modal-backdrop hidden" id="scaffold-modal">
  <div class="modal">
    <h3>New document scaffold</h3>
    <div style="display:flex;gap:6px;margin-bottom:12px;">
      <button class="btn" data-scaffold="contract">Contract</button>
      <button class="btn" data-scaffold="evidence">Evidence</button>
      <button class="btn" data-scaffold="precedent">Precedent</button>
    </div>
    <textarea id="scaffold-text" readonly></textarea>
    <div class="modal-actions">
      <button class="btn" id="scaffold-copy">Copy</button>
      <button class="btn" id="scaffold-close">Close</button>
    </div>
  </div>
</div>

<!-- lifecycle modal -->
<div class="modal-backdrop hidden" id="lifecycle-modal">
  <div class="modal">
    <h3>Contract lifecycle check</h3>
    <div id="lifecycle-results"></div>
    <div class="modal-actions">
      <button class="btn" id="lifecycle-close">Close</button>
    </div>
  </div>
</div>

<script>
// ── state ──
const store = { contracts: [], evidence: [], precedents: [], hooks: [], prompts: [], constitution: null, indexYaml: null };

// ── load from API ──
async function loadAll() {
  store.contracts = [];
  store.evidence = [];
  store.precedents = [];
  store.hooks = [];
  store.prompts = [];
  store.constitution = null;
  store.indexYaml = null;

  try {
    const resp = await fetch('/api/files');
    const files = await resp.json();

    for (const { path, content } of files) {
      const parsed = parseDoc(content, path);

      if (path === 'constitution.md') {
        store.constitution = parsed;
      } else if (path.startsWith('contracts/') && path.endsWith('.md')) {
        parsed._archived = path.includes('archived/');
        store.contracts.push(parsed);
      } else if (path.startsWith('evidence/') && path.endsWith('.md')) {
        store.evidence.push(parsed);
      } else if (path === 'precedents/INDEX.yaml') {
        store.indexYaml = parsed;
      } else if (path.startsWith('precedents/') && path.endsWith('.yaml')) {
        store.precedents.push(parsed);
      } else if (path.startsWith('hooks/') && (path.endsWith('.py') || path.endsWith('.md'))) {
        store.hooks.push(parsed);
      } else if (path.startsWith('prompts/') && path.endsWith('.md')) {
        store.prompts.push(parsed);
      }
    }

    renderFileList();
    document.getElementById('status-bar').textContent =
      `${store.contracts.length} contracts, ${store.evidence.length} evidence, ${store.precedents.length} precedents`;

    // auto-show constitution or first doc
    document.getElementById('welcome').classList.add('hidden');
    document.getElementById('doc-view').classList.remove('hidden');
    const first = store.constitution || store.contracts[0] || store.evidence[0] || store.precedents[0];
    if (first) showDoc(first._path);
  } catch (e) {
    document.getElementById('welcome-msg').textContent = 'Failed to load: ' + e.message;
  }
}

// auto-load on page open
loadAll();

// ── parsers ──
function parseDoc(text, path) {
  const doc = { _path: path, _raw: text, meta: {}, body: '' };

  // YAML frontmatter
  const fm = text.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)/);
  if (fm) {
    doc.meta = parseYamlSimple(fm[1]);
    doc.body = fm[2].trim();
  } else if (path.endsWith('.yaml')) {
    doc.meta = parseYamlSimple(text);
    doc.body = '';
  } else {
    doc.body = text.trim();
  }
  return doc;
}

function parseYamlSimple(text) {
  const obj = {};
  let currentKey = null;
  let currentVal = '';
  let inMultiline = false;
  let indent = 0;

  for (const line of text.split('\n')) {
    // continuation of multiline value
    if (inMultiline) {
      if (line === '' || (line.match(/^\s/) && !line.match(/^\S/))) {
        if (line.trim()) currentVal += (currentVal ? ' ' : '') + line.trim();
        continue;
      } else {
        obj[currentKey] = currentVal.trim();
        inMultiline = false;
      }
    }

    // key: value (supports path-shaped keys like hooks/session_start.py)
    const kv = line.match(/^(\w[\w_./-]*):\s*(.*)/);
    if (kv) {
      currentKey = kv[1];
      const val = kv[2].trim();
      if (val === '>' || val === '|') {
        inMultiline = true;
        currentVal = '';
      } else if (val === '') {
        // nested object or empty — store as nested
        obj[currentKey] = {};
      } else {
        obj[currentKey] = val;
      }
    } else if (line.match(/^\s+-\s/) && currentKey) {
      // list item
      if (!Array.isArray(obj[currentKey])) obj[currentKey] = [];
      const item = line.replace(/^\s+-\s*/, '').trim();
      // check if it's a mapping
      const ikv = item.match(/^(\w[\w_./-]*):\s*(.*)/);
      if (ikv) {
        const listObj = { [ikv[1]]: ikv[2] };
        // peek ahead — handled simply
        obj[currentKey].push(listObj);
      } else {
        obj[currentKey].push(item);
      }
    } else if (line.match(/^\s+\w[\w_./-]*:/) && currentKey && typeof obj[currentKey] === 'object') {
      const nested = line.match(/^\s+(\w[\w_./-]*):\s*(.*)/);
      if (nested) {
        if (Array.isArray(obj[currentKey])) {
          // continuation of last list item — add field to same object
          const last = obj[currentKey][obj[currentKey].length - 1];
          if (last && typeof last === 'object') last[nested[1]] = nested[2].trim();
        } else {
          obj[currentKey][nested[1]] = nested[2].trim();
        }
      }
    }
  }

  if (inMultiline && currentKey) obj[currentKey] = currentVal.trim();
  return obj;
}

// ── rendering ──
function renderFileList() {
  const list = document.getElementById('file-list');
  const activeTab = document.querySelector('.tab.active')?.dataset.tab || 'contracts';
  list.innerHTML = '';

  if (activeTab === 'contracts') {
    if (store.constitution) {
      list.innerHTML += `<div class="file-group">Constitution</div>`;
      list.innerHTML += fileItem(store.constitution, 'constitution');
    }
    const active = store.contracts.filter(c => !c._archived);
    const archived = store.contracts.filter(c => c._archived);
    if (active.length) {
      list.innerHTML += `<div class="file-group">Active</div>`;
      active.forEach(c => list.innerHTML += fileItem(c, 'contract'));
    }
    if (archived.length) {
      list.innerHTML += `<div class="file-group">Archived</div>`;
      archived.forEach(c => list.innerHTML += fileItem(c, 'contract-archived'));
    }
  } else if (activeTab === 'evidence') {
    store.evidence.forEach(e => list.innerHTML += fileItem(e, 'evidence'));
  } else if (activeTab === 'precedents') {
    store.precedents.forEach(p => list.innerHTML += fileItem(p, 'precedent'));
  } else if (activeTab === 'runtime') {
    if (store.hooks.length) {
      list.innerHTML += `<div class="file-group">Hooks</div>`;
      store.hooks.forEach(h => list.innerHTML += fileItem(h, 'hook'));
    }
    if (store.prompts.length) {
      list.innerHTML += `<div class="file-group">Prompts</div>`;
      store.prompts.forEach(p => list.innerHTML += fileItem(p, 'prompt'));
    }
    if (!store.hooks.length && !store.prompts.length) {
      list.innerHTML += `<div class="file-group" style="color:var(--text-dim)">No hooks or prompts found</div>`;
    }
  }

  // bind clicks
  list.querySelectorAll('.file-item').forEach(el => {
    el.addEventListener('click', () => {
      list.querySelectorAll('.file-item').forEach(x => x.classList.remove('active'));
      el.classList.add('active');
      showDoc(el.dataset.path);
    });
  });
}

function fileItem(doc, type) {
  const name = doc._path.split('/').pop().replace(/\.(md|yaml)$/, '');
  let badge = '';
  if (type === 'contract-archived') badge = '<span class="badge badge-archived">archived</span>';
  else if (type === 'constitution') badge = '<span class="badge badge-active">v' + (doc.meta.version || '1') + '</span>';
  else if (doc.meta.severity) badge = `<span class="badge badge-${doc.meta.severity?.toLowerCase()}">${doc.meta.severity}</span>`;
  else if (doc.meta.status === 'accepted_risk') badge = '<span class="badge badge-risk">accepted risk</span>';
  else if (doc.meta.status === 'active') badge = '<span class="badge badge-active">active</span>';
  else if (doc.meta.contract_id) badge = '<span class="badge badge-active">active</span>';

  return `<div class="file-item" data-path="${doc._path}">${name} ${badge}</div>`;
}

function showDoc(path) {
  document.getElementById('welcome').classList.add('hidden');
  document.getElementById('doc-view').classList.remove('hidden');

  const all = [...store.contracts, ...store.evidence, ...store.precedents, ...store.hooks, ...store.prompts];
  if (store.constitution) all.push(store.constitution);
  const doc = all.find(d => d._path === path);
  if (!doc) return;

  document.getElementById('doc-title').textContent = path;

  // metadata table
  let html = '';
  const meta = doc.meta;
  if (Object.keys(meta).length > 0) {
    html += '<div class="meta-table">';
    for (const [k, v] of Object.entries(meta)) {
      html += '<div class="meta-row">';
      html += `<div class="meta-key">${escHtml(k)}</div>`;
      html += `<div class="meta-val">${renderMetaVal(k, v)}</div>`;
      html += '</div>';
    }
    html += '</div>';
  }

  // body
  if (doc.body) {
    html += '<div class="md-body">' + renderMarkdown(doc.body) + '</div>';
  }

  document.getElementById('doc-content').innerHTML = html;
}

function renderMetaVal(key, val) {
  if (val === null || val === undefined) return '<span style="color:var(--text-dim)">null</span>';

  if (typeof val === 'object' && !Array.isArray(val)) {
    let s = '<div style="padding:4px 0">';
    for (const [k2, v2] of Object.entries(val)) {
      s += `<div><code>${escHtml(k2)}</code>: ${escHtml(String(v2))}</div>`;
    }
    return s + '</div>';
  }

  if (Array.isArray(val)) {
    if (val.length === 0) return '[]';
    let s = '<ul style="margin:0;padding-left:16px">';
    for (const item of val) {
      if (typeof item === 'object') {
        s += '<li>' + Object.entries(item).map(([k,v]) => `<code>${escHtml(k)}</code>: ${escHtml(String(v))}`).join(', ') + '</li>';
      } else {
        s += `<li>${escHtml(String(item))}</li>`;
      }
    }
    return s + '</ul>';
  }

  const str = String(val);

  // linkify URLs
  if (str.match(/^https?:\/\//)) return `<a href="${escHtml(str)}" target="_blank">${escHtml(str)}</a>`;

  // commit SHA
  if (key === 'commit' && str.match(/^[0-9a-f]{40}$/)) {
    const repo = ''; // would need repo URL
    return `<code>${escHtml(str)}</code>`;
  }

  // severity badge
  if (key === 'severity' && str.match(/^P[123]$/)) {
    return `<span class="badge badge-${str.toLowerCase()}">${str}</span>`;
  }

  // status badge
  if (key === 'status') {
    const cls = str === 'active' ? 'badge-active' : str === 'accepted_risk' ? 'badge-risk' : 'badge-archived';
    return `<span class="badge ${cls}">${escHtml(str)}</span>`;
  }

  // evidence type
  if (key === 'type' && str === 'evidence') {
    return '<span class="etype etype-det">evidence</span>';
  }

  return escHtml(str);
}

// ── minimal markdown renderer ──
function renderMarkdown(text) {
  let html = '';
  const lines = text.split('\n');
  let i = 0;
  let inCode = false;
  let codeLang = '';
  let codeLines = [];
  let inTable = false;
  let tableRows = [];
  let inList = false;
  let listType = 'ul';
  let listItems = [];

  function flushList() {
    if (!inList) return;
    html += `<${listType}>${listItems.map(l => `<li>${inlineMarkdown(l)}</li>`).join('')}</${listType}>`;
    inList = false;
    listItems = [];
  }

  function flushTable() {
    if (!inTable) return;
    html += '<table>';
    tableRows.forEach((row, ri) => {
      if (ri === 1 && row.match(/^[\s|:-]+$/)) return; // separator
      const tag = ri === 0 ? 'th' : 'td';
      const cells = row.split('|').filter(c => c.trim() !== '');
      html += '<tr>' + cells.map(c => `<${tag}>${inlineMarkdown(c.trim())}</${tag}>`).join('') + '</tr>';
    });
    html += '</table>';
    inTable = false;
    tableRows = [];
  }

  while (i < lines.length) {
    const line = lines[i];

    // code fence
    if (line.match(/^```/)) {
      if (inCode) {
        html += `<pre><code>${escHtml(codeLines.join('\n'))}</code></pre>`;
        inCode = false;
        codeLines = [];
      } else {
        flushList();
        flushTable();
        inCode = true;
        codeLang = line.replace(/^```/, '').trim();
      }
      i++; continue;
    }
    if (inCode) { codeLines.push(line); i++; continue; }

    // table
    if (line.match(/^\|/)) {
      flushList();
      if (!inTable) inTable = true;
      tableRows.push(line);
      i++; continue;
    } else { flushTable(); }

    // heading
    const hm = line.match(/^(#{1,3})\s+(.*)/);
    if (hm) {
      flushList();
      const level = hm[1].length;
      html += `<h${level}>${inlineMarkdown(hm[2])}</h${level}>`;
      i++; continue;
    }

    // list item
    const lm = line.match(/^(\s*)([-*]|\d+\.)\s+(.*)/);
    if (lm) {
      const newType = lm[2].match(/\d/) ? 'ol' : 'ul';
      if (!inList || listType !== newType) {
        flushList();
        inList = true;
        listType = newType;
      }
      listItems.push(lm[3]);
      i++; continue;
    } else { flushList(); }

    // blockquote
    if (line.match(/^>\s/)) {
      html += `<blockquote><p>${inlineMarkdown(line.replace(/^>\s*/, ''))}</p></blockquote>`;
      i++; continue;
    }

    // blank line
    if (line.trim() === '') { i++; continue; }

    // paragraph
    let para = line;
    while (i + 1 < lines.length && lines[i + 1].trim() !== '' && !lines[i + 1].match(/^[#|>`\-*\d]/) && !lines[i + 1].match(/^```/)) {
      i++;
      para += ' ' + lines[i];
    }
    html += `<p>${inlineMarkdown(para)}</p>`;
    i++;
  }

  flushList();
  flushTable();
  return html;
}

function inlineMarkdown(text) {
  return escHtml(text)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.*?)`/g, '<code>$1</code>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>')
    // evidence type badges
    .replace(/\(evidence type: deterministic\)/g, '<span class="etype etype-det">deterministic</span>')
    .replace(/\(evidence type: analytical\)/g, '<span class="etype etype-ana">analytical</span>')
    .replace(/\(evidence type: subjective\)/g, '<span class="etype etype-sub">subjective</span>')
    .replace(/\(inferred\)/g, '<span class="etype etype-ana">inferred</span>');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── scaffold templates ──
const scaffolds = {
  contract: `---
contract_id: my-task
version: 1
parties:
  principal: human
  agent: claude

  target: src/main.py
  mode: edit
evidence:
  required:
    - grep confirmation
    - test pass

  done_when: task complete with evidence
on_conflict:
  - safety constraints override all
---

# Operation

Describe what to do.

  evidence: `---

# Summary

# Findings

  precedent: `id: my-precedent

  One sentence describing what was decided.

severity: P2

status: active
related: []
date: ${new Date().toISOString().slice(0,10)}
supersedes: null
superseded_by: null`
};

// ── lifecycle checker ──
function checkLifecycle() {
  const results = document.getElementById('lifecycle-results');
  let html = '';

  // ── contract / evidence checks ──
  const archived = store.contracts.filter(c => c._archived);
  const evidenceIds = store.evidence.map(e => e.meta.contract_id);

  if (archived.length || store.evidence.length) {
    html += '<div class="file-group">Contracts &amp; Evidence</div>';

    archived.forEach(c => {
      const cid = c.meta.contract_id;
      const hasEvidence = evidenceIds.includes(cid);
      html += `<div class="lifecycle-row">
        <span class="status-icon ${hasEvidence ? 'lifecycle-ok' : 'lifecycle-missing'}">${hasEvidence ? '✓' : '✗'}</span>
        <span><code>${escHtml(cid)}</code></span>
        <span style="color:var(--text-dim)">${hasEvidence ? 'evidence found' : 'no evidence file'}</span>
      </div>`;
    });

    store.evidence.forEach(e => {
      const cid = e.meta.contract_id;
      const hasContract = store.contracts.some(c => c.meta.contract_id === cid);
      if (!hasContract) {
        html += `<div class="lifecycle-row">
          <span class="status-icon lifecycle-warn">⚠</span>
          <span>Evidence <code>${escHtml(cid)}</code></span>
          <span style="color:var(--text-dim)">no matching contract</span>
        </div>`;
      }
    });

    store.evidence.forEach(e => {
      const hasCommit = e.meta.commit && String(e.meta.commit).match(/^[0-9a-f]{7,40}$/);
      if (!hasCommit) {
        html += `<div class="lifecycle-row">
          <span class="status-icon lifecycle-warn">⚠</span>
          <span>Evidence <code>${escHtml(e.meta.contract_id || e._path)}</code></span>
          <span style="color:var(--text-dim)">missing commit pin</span>
        </div>`;
      }
    });

    store.evidence.forEach(e => {
      if (e.meta.status === 'draft') {
        html += `<div class="lifecycle-row">
          <span class="status-icon lifecycle-warn">⚠</span>
          <span>Evidence <code>${escHtml(e.meta.contract_id || e._path)}</code></span>
          <span style="color:var(--text-dim)">status: draft — commit pin pending</span>
        </div>`;
      }
    });
  }

  // ── runtime controls — always run ──
  html += '<div class="file-group">Runtime Controls</div>';

  const expectedHooks = ['session_start.py', 'post_compact.py', 'subagent_start.py', 'pre_edit.py', 'post_read.py', 'on_stop.py'];
  const foundHookPaths = store.hooks.map(h => h._path);
  const foundHookNames = store.hooks.map(h => h._path.split('/').pop());
  expectedHooks.forEach(h => {
    const found = foundHookNames.includes(h);
    html += `<div class="lifecycle-row">
      <span class="status-icon ${found ? 'lifecycle-ok' : 'lifecycle-missing'}">${found ? '✓' : '✗'}</span>
      <span>Hook <code>${h}</code></span>
      <span style="color:var(--text-dim)">${found ? 'present' : 'missing'}</span>
    </div>`;
  });

  const expectedPrompts = ['preamble.md', 'executor.md', 'jury.md'];
  const foundPromptNames = store.prompts.map(p => p._path.split('/').pop());
  expectedPrompts.forEach(p => {
    const found = foundPromptNames.includes(p);
    html += `<div class="lifecycle-row">
      <span class="status-icon ${found ? 'lifecycle-ok' : 'lifecycle-missing'}">${found ? '✓' : '✗'}</span>
      <span>Prompt <code>${p}</code></span>
      <span style="color:var(--text-dim)">${found ? 'present' : 'missing'}</span>
    </div>`;
  });

  // ── evidence ↔ runtime cross-check ──
  store.evidence.forEach(e => {
    const hooks = e.meta.runtime_hooks || {};
    const prompts = e.meta.runtime_prompts || {};
    if (!Object.keys(hooks).length && !Object.keys(prompts).length) return;
    for (const [event, path] of Object.entries(hooks)) {
      const exists = foundHookPaths.includes(path.replace(/^\.agent\//, ''));
      if (!exists) {
        html += `<div class="lifecycle-row">
          <span class="status-icon lifecycle-missing">✗</span>
          <span>Evidence <code>${escHtml(e.meta.contract_id)}</code> declares hook ${escHtml(event)}: <code>${escHtml(path)}</code></span>
          <span style="color:var(--text-dim)">file not found</span>
        </div>`;
      }
    }
    for (const [role, path] of Object.entries(prompts)) {
      const exists = store.prompts.some(p => p._path === path.replace(/^\.agent\//, ''));
      if (!exists) {
        html += `<div class="lifecycle-row">
          <span class="status-icon lifecycle-missing">✗</span>
          <span>Evidence <code>${escHtml(e.meta.contract_id)}</code> declares prompt ${escHtml(role)}: <code>${escHtml(path)}</code></span>
          <span style="color:var(--text-dim)">file not found</span>
        </div>`;
      }
    }
  });

  // ── precedent INDEX checks ──
  if (store.precedents.length) {
    html += '<div class="file-group">Precedent INDEX</div>';

    if (!store.indexYaml) {
      html += `<div class="lifecycle-row">
        <span class="status-icon lifecycle-missing">✗</span>
        <span>INDEX.yaml</span>
        <span style="color:var(--text-dim)">missing — run: python .agent/tools/index.py .agent/precedents</span>
      </div>`;
    } else {
      html += `<div class="lifecycle-row">
        <span class="status-icon lifecycle-ok">✓</span>
        <span>INDEX.yaml</span>
        <span style="color:var(--text-dim)">present</span>
      </div>`;

      const indexEntries = Array.isArray(store.indexYaml.meta.entries) ? store.indexYaml.meta.entries : [];
      const indexIds = indexEntries.map(e => e.id).filter(Boolean);
      const precIds = store.precedents.map(p => p.meta.id || p._path.replace('precedents/', '').replace('.yaml', ''));

      // every precedent file appears in INDEX?
      precIds.forEach(pid => {
        if (!indexIds.includes(pid)) {
          html += `<div class="lifecycle-row">
            <span class="status-icon lifecycle-missing">✗</span>
            <span>Precedent <code>${escHtml(pid)}</code></span>
            <span style="color:var(--text-dim)">missing from INDEX.yaml</span>
          </div>`;
        }
      });

      // every INDEX entry has a matching file?
      indexIds.forEach(iid => {
        if (!precIds.includes(iid)) {
          html += `<div class="lifecycle-row">
            <span class="status-icon lifecycle-missing">✗</span>
            <span>INDEX entry <code>${escHtml(iid)}</code></span>
            <span style="color:var(--text-dim)">no matching precedent file</span>
          </div>`;
        }
      });

      // copied fields match source?
      const copiedFields = ['holding', 'applies_when', 'tags', 'severity', 'status', 'date', 'supersedes', 'superseded_by'];
      store.precedents.forEach(p => {
        const pid = p.meta.id || p._path.replace('precedents/', '').replace('.yaml', '');
        const indexEntry = indexEntries.find(e => e.id === pid);
        if (!indexEntry) return;
        copiedFields.forEach(field => {
          const srcVal = String(p.meta[field] || '');
          const idxVal = String(indexEntry[field] || '');
          if (srcVal !== idxVal && (srcVal || idxVal)) {
            html += `<div class="lifecycle-row">
              <span class="status-icon lifecycle-warn">⚠</span>
              <span><code>${escHtml(pid)}</code> → <code>${field}</code></span>
              <span style="color:var(--text-dim)">INDEX value differs from source</span>
            </div>`;
          }
        });
      });
    }
  }

  if (!html) html = '<div class="lifecycle-row"><span class="status-icon lifecycle-ok">✓</span> All checks pass.</div>';

  results.innerHTML = html;
  document.getElementById('lifecycle-modal').classList.remove('hidden');
}

// ── event bindings ──
document.getElementById('btn-reload').addEventListener('click', loadAll);

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderFileList();
  });
});

document.getElementById('btn-scaffold').addEventListener('click', () => {
  document.getElementById('scaffold-text').value = scaffolds.contract;
  document.getElementById('scaffold-modal').classList.remove('hidden');
});
document.getElementById('scaffold-close').addEventListener('click', () => {
  document.getElementById('scaffold-modal').classList.add('hidden');
});
document.getElementById('scaffold-copy').addEventListener('click', () => {
  const ta = document.getElementById('scaffold-text');
  navigator.clipboard.writeText(ta.value);
});
document.querySelectorAll('[data-scaffold]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('scaffold-text').value = scaffolds[btn.dataset.scaffold];
  });
});

document.getElementById('btn-lifecycle').addEventListener('click', checkLifecycle);
document.getElementById('lifecycle-close').addEventListener('click', () => {
  document.getElementById('lifecycle-modal').classList.add('hidden');
});

// close modals on backdrop click
document.querySelectorAll('.modal-backdrop').forEach(el => {
  el.addEventListener('click', e => {
    if (e.target === el) el.classList.add('hidden');
  });
});
</script>
