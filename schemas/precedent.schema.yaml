# Precedent Schema
# Each precedent is a YAML file in .agent/precedents/.
#
# Required fields:
#   id            unique slug (kebab-case)
#   holding       what was decided (one sentence)
#   applies_when  when this precedent is relevant
#   origin        where this came from (user correction, audit, etc.)
#
# Optional fields:
#   supersedes    id of precedent this replaces (null if none)
#   severity      how important (P1/P2/P3)
#   tags          subject tags for index matching (list of strings)
#   status        active | superseded | disputed | accepted_risk
#   related       ids of related precedents (citation graph)
#   superseded_by id of precedent that replaced this one (red flag)
#   date          when recorded
#   evidence      what supported the decision
#   notes         additional context
#
# Precedents are cited by id. When a judgment call matches
# applies_when, the agent should check and cite the precedent
# rather than reasoning from scratch.
#
# Retrieval:
#   Small scale: agent reads INDEX.yaml, matches applies_when/tags
#   Medium scale: script generates INDEX.yaml from precedent files
#   Large scale: LLM semantic match over applies_when lines
#   INDEX.yaml is Westlaw; precedent files are case reports.
#
# INDEX.yaml Generation:
#   INDEX.yaml is a generated artifact — not a source of truth.
#   Precedent files are the source of truth.
#   Manual edits to INDEX.yaml are forbidden.
#
#   Generated from: .agent/precedents/*.yaml (excluding INDEX.yaml)
#   Generator:      python .agent/tools/index.py .agent/precedents
#   Checker:        python .agent/tools/index.py .agent/precedents --check
#
#   Copied fields (deterministic order):
#     id, holding, applies_when, tags, severity,
#     status, date, supersedes, superseded_by
#
#   Sort order: alphabetical by id
#   Format: YAML list under top-level entries: key
#
#   Lifecycle checks (enforced by judge):
#     ✓ INDEX.yaml present when precedent files exist
#     ✓ Every precedent file appears in INDEX.yaml
#     ✓ Every INDEX entry points to an existing file
#     ✓ Copied field values match source precedent
#     ✗ Stale index = evidence failure / non-performance risk
#
# Example:
#
# id: context-is-ephemeral
# holding: >
#   State in context window dies on restart or compaction.
#   Critical state belongs in durable storage.
# applies_when: designing agent memory or evaluating state persistence
# origin: observed restart/compaction loss during agent memory design
# severity: P1
# tags: [memory, persistence, architecture, compaction]
# status: active
# related: []
# supersedes: null
# superseded_by: null
